# GENERAL {{{
set $mod Mod4
set $alt Mod1
set $hyper Mod3
font pango:Helvetica Neue 12
gaps outer 0
gaps inner 8
for_window [class="^.*"] border pixel 3
workspace_auto_back_and_forth yes
smart_borders on
smart_gaps on
focus_on_window_activation focus
popup_during_fullscreen smart
# }}}

# STARTUP {{{
exec        --no-startup-id aria2c &
exec        --no-startup-id play-with-mpv &
exec        --no-startup-id zsh ~/.config/wpg/wp_init.sh &
exec        --no-startup-id xss-lock --transfer-sleep-lock -- sh ~/scripts/i3lock/lockerfancy
exec        --no-startup-id picom &
exec        --no-startup-id xset s off &
exec        --no-startup-id redshift &
exec        --no-startup-id ibus-daemon -drxR
exec        --no-startup-id unclutter &
exec        --no-startup-id ~/.local/bin/i3-notifier &
exec        --no-startup-id zsh ~/scripts/other/mkdocs-init &
exec_always --no-startup-id sleep 3 && xrdb -load ~/.config/X11/Xresources &
exec_always --no-startup-id zsh ~/scripts/hardware/default-input &
exec_always --no-startup-id autotiling &
exec_always --no-startup-id zsh ~/scripts/polybar/launch &
#exec       --no-startup-id /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# }}}

# COLORS {{{
set_from_resource $fg i3wm.color7 #f0f0f0
set_from_resource $c2 i3wm.color8 #f0f0f0
set_from_resource $bg i3wm.color0 #f0f0f0
set_from_resource $c1 i3wm.color2 #f0f0f0
## class                border  backgr  text indicator child_border
client.focused          $c2     $bg     $fg  $c2       $c2
client.focused_inactive $bg     $bg     $fg  $bg       $bg
client.unfocused        $bg     $bg     $fg  $bg       $bg
client.urgent           $bg     $bg     $fg  $bg       $bg
client.placeholder      $bg     $bg     $fg  $bg       $bg
client.background       $bg
#}}}

