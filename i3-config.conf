# GENERAL {{{
# Set main modifier and other modifier aliases
set $mod Mod4
set $alt Mod1
set $hyper Mod3

# Set font for error bars and whatnot
font pango:Helvetica Neue 12

# Set gaps
gaps outer 0
gaps inner 8

# Leave gaps for polybar
gaps top 40

# Set global border
for_window [class="^.*"] border pixel 3

# Smart borders
smart_borders on

# Change focus priority
focus_on_window_activation focus

# Change fullscreen priority
popup_during_fullscreen smart
# }}}

# STARTUP {{{
# Aria2c capture daemon to download from browser
exec --no-startup-id aria2c &

# Play any video with mpv from browser
exec --no-startup-id play-with-mpv &

# Wallpaper and colorschemes
exec --no-startup-id zsh ~/.config/wpg/wp_init.sh &

# Use i3lock
exec --no-startup-id xss-lock --transfer-sleep-lock -- sh ~/scripts/i3lock/lockerfancy

# Start picom
exec --no-startup-id picom &

# Turn off screensaver
exec --no-startup-id xset s off &

# Warm filter at night
exec --no-startup-id redshift &

# Start ibus daemon for ibus-unikey
exec --no-startup-id ibus-daemon -drxR

# Unclutter hides mouse after short timeout
exec --no-startup-id unclutter &

# Notification daemon
exec --no-startup-id ~/.local/bin/i3-notifier &

# Local notes server
exec --no-startup-id zsh ~/scripts/other/mkdocs-init &

# Launch polybar
exec --no-startup-id zsh ~/scripts/polybar/launch &

# Source Xresources file
exec_always --no-startup-id sleep 3 && xrdb -load ~/.config/X11/Xresources &

# Remap modkeys
exec_always --no-startup-id zsh ~/scripts/hardware/default-input &

# Start autotiling on all workspaces
exec_always --no-startup-id autotiling &

# Bloat, i turned it off
#exec       --no-startup-id /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# }}}

# COLORS {{{
set_from_resource $fg i3wm.color7 #f0f0f0
set_from_resource $c2 i3wm.color8 #f0f0f0
set_from_resource $bg i3wm.color0 #f0f0f0
set_from_resource $c1 i3wm.color2 #f0f0f0
## class                border  backgr  text indicator child_border
client.focused          $c2     $bg     $fg  $c2       $c2
client.focused_inactive $bg     $bg     $fg  $bg       $bg
client.unfocused        $bg     $bg     $fg  $bg       $bg
client.urgent           $bg     $bg     $fg  $bg       $bg
client.placeholder      $bg     $bg     $fg  $bg       $bg
client.background       $bg
#}}}

# KEYBINDINGS {{{
# Set floating modifier for float resize etc.
floating_modifier $mod

# Scratchpad
bindsym $mod+minus        move scratchpad
bindsym $mod+plus         scratchpad show

# Switch focus
bindsym $mod+h            focus left
bindsym $mod+j            focus down
bindsym $mod+k            focus up
bindsym $mod+l            focus right
bindsym $mod+Shift+h      move left
bindsym $mod+Shift+j      move down
bindsym $mod+Shift+k      move up
bindsym $mod+Shift+l      move right

# Split
bindsym $mod+v            split v
bindsym $mod+z            split h
bindsym $mod+Shift+z      layout toggle split

# Some toggles
bindsym $mod+f            fullscreen toggle
bindsym $mod+x            focus mode_toggle
bindsym $mod+o            sticky toggle
bindsym $mod+Shift+space  floating toggle

# Kill windows
bindsym $mod+Shift+q      kill

# Music setup
bindsym $hyper+slash      exec --no-startup-id playerctl -p ncspot play-pause
bindsym $mod+s            exec --no-startup-id kitty -o window_padding_width=20 -o tab_bar_min_tabs=2 -T spotify ncspot
bindsym $mod+semicolon    exec --no-startup-id kitty -o window_padding_width=0 -o tab_bar_min_tabs=2 -T cover bash ~/scripts/other/dpcover
bindsym $mod+apostrophe   exec --no-startup-id kitty -o window_padding_width=20 -o tab_bar_min_tabs=2 -o font_size=6 -T cava bash ~/scripts/other/colorcava 2>/dev/null
bindsym $hyper+s          [class="^kitty$" title="^spotify$"] focus

# Browser
bindsym $mod+b            exec --no-startup-id brave --js-flags="--jitless" --enable-features=VaapiVideoDecode
bindsym $hyper+b          [class="Brave"] focus

# Rofi launchers
bindsym $mod+p            exec --no-startup-id zsh -c ~/scripts/rofi/powermenu &
bindsym $mod+space        exec --no-startup-id zsh -c ~/scripts/rofi/launcher &
bindsym $mod+period       exec --no-startup-id zsh -c ~/scripts/rofi/emojipick/emojipick &
bindsym $alt+Tab          exec rofi -show window
bindsym $mod+n            exec --no-startup-id dbus-send --session --print-reply --dest=org.freedesktop.Notifications /org/freedesktop/Notifications org.freedesktop.Notifications.ShowNotifications &

# Terminal
bindsym $mod+Return       exec --no-startup-id kitty
bindsym $mod+Shift+Return exec kitty -T floatingKitty
bindsym $hyper+t          [class="kitty"] focus

# Calculator
bindsym $mod+c            exec --no-startup-id qalculate-gtk

# Popup a scratchpad in neovim
bindsym $mod+g            exec bash ~/scripts/other/text-scratchpad

# Reload stuff
bindsym $mod+Shift+p      exec --no-startup-id zsh ~/scripts/polybar/launch
bindsym $mod+Shift+w      exec --no-startup-id wpg -s $(wpg -c)
bindsym $alt+space        exec --no-startup-id zsh ~/scripts/hardware/chkm &
bindsym $mod+Shift+c      reload
bindsym $mod+Shift+r      restart
bindsym $mod+Shift+x      exec "i3-nagbar -t warning -m 'You pressed the exit shortcut. Do you really want to exit i3? This will end your X session.' -b 'Yes, exit i3' 'i3-msg exit'"

# Volume and mic
bindsym $hyper+period     exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10%
bindsym $hyper+comma      exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10%
bindsym $hyper+m          exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym $hyper+n          exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindsym $hyper+v          [class="Easyeffects"] focus

# Screenshot
bindsym $hyper+Shift+p    exec --no-startup-id maim -s | xclip -selection clipboard -t image/png
bindsym $hyper+p          exec maim ~/pictures/screenshots/$(date +%s).png && notify-send "screenshot saved!" &

# Discord
bindsym $mod+d            exec --not-startup-id discord
bindsym $hyper+d          [class="discord"] focus
# }}}

# WINDOW RULES {{{
# MPV
for_window [class="mpv"] floating enable

# Pavucontrol
for_window [class="Pavucontrol"] floating enable
for_window [class="Pavucontrol"] resize set 940 680

# File manager
for_window [class="Pcmanfm"] floating enable
for_window [class="Pcmanfm"] resize set 940 680

# Calculator
for_window [class="Qalculate-gtk"] floating enable
for_window [class="Qalculate-gtk"] resize set 640 480

# Kitty
for_window [class="^kitty$" title="^textScratchpad$"] floating enable
for_window [class="^kitty$" title="^floatingKitty$"] floating enable;
for_window [class="^kitty$" title="^floatingKitty$"] resize set 740 480; move absolute position center
for_window [class="^kitty$" title="^cava$"] floating enable;
for_window [class="^kitty$" title="^cava$"] resize set 840 320
for_window [class="^kitty$" title="^spotify$"] floating enable;
for_window [class="^kitty$" title="^spotify$"] resize set 740 480; move absolute position center
for_window [class="^kitty$" title="^cover$"] floating enable;
for_window [class="^kitty$" title="^cover$"] resize set 300 300

# Wpg
for_window [class="Wpg"] floating enable
for_window [class="Wpg"] resize set 640 480

# Steam
for_window [class="^Steam$" title="^Friends$"] floating enable
for_window [class="^Steam$" title="Steam - News"] floating enable
for_window [class="^Steam$" title=".* - Chat"] floating enable
for_window [class="^Steam$" title="^Settings$"] floating enable
for_window [class="^Steam$" title=".* - event started"] floatin enable
for_window [class="^Steam$" title=".* CD key"] floating enable
for_window [class="^Steam$" title="^Steam - Self Updater$"] floating enable
for_window [class="^Steam$" title="^Screenshot Uploader$"] floating enable
for_window [class="^Steam$" title="^Steam Guard - Computer Authorization Required$"] floating enable
for_window [title="^Steam Keyboard$"]  floating enable
for_window [class="steam_app_1182480"] floating enable

# Feh
for_window [class="feh"] floating enable
for_window [class="feh"] resize set 1280 720
# }}}

# WORKSPACES {{{
# Change workspace
bindsym $mod+1           workspace 1: Term
bindsym $mod+2           workspace 2: Web
bindsym $mod+3           workspace 3: Study
bindsym $mod+4           workspace 4: Media
bindsym $mod+5           workspace 5: Games
bindsym $mod+6           workspace 6
bindsym $mod+7           workspace 7
bindsym $mod+8           workspace 8
bindsym $mod+9           workspace 9
bindsym $mod+0           workspace 10
# Move to workspace
bindsym $mod+Left        workspace prev
bindsym $mod+Right       workspace next
bindsym $mod+backslash   workspace back_and_forth
bindsym $mod+Shift+1     move container to workspace 1: Term
bindsym $mod+Shift+2     move container to workspace 2: Web
bindsym $mod+Shift+3     move container to workspace 3: Study
bindsym $mod+Shift+4     move container to workspace 4: Media
bindsym $mod+Shift+5     move container to workspace 5: Games
bindsym $mod+Shift+6     move container to workspace 6
bindsym $mod+Shift+7     move container to workspace 7
bindsym $mod+Shift+8     move container to workspace 8
bindsym $mod+Shift+9     move container to workspace 9
bindsym $mod+Shift+0     move container to workspace 10
bindsym $mod+Shift+Left  move container to workspace prev
bindsym $mod+Shift+Right move container to workspace next
# }}}


# MODES {{{
mode "resize" {
    bindsym j         resize shrink width 10 px or 10 ppt
    bindsym k         resize grow height 10 px or 10 ppt
    bindsym l         resize shrink height 10 px or 10 ppt
    bindsym semicolon resize grow width 10 px or 10 ppt
    bindsym Left      resize shrink width 10 px or 10 ppt
    bindsym Down      resize grow height 10 px or 10 ppt
    bindsym Up        resize shrink height 10 px or 10 ppt
    bindsym Right     resize grow width 10 px or 10 ppt
    bindsym Return    mode "default"
    bindsym Escape    mode "default"
    bindsym $mod+r    mode "default"
}
bindsym $mod+r        mode "resize"
# }}}
