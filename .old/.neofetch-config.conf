# :.config/neofetch/config.conf

print_info() {
    prin ""
    info title
    prin "$(color 1)’×¤$(color 2) ’×¤$(color 3) ’×¤$(color 4) ’×¤$(color 5) ’×¤$(color 6) ’×¤$(color 7) ’×¤"
    prin ""
    prin "$(color 1)├Ś" "$(echo $( lsb_release -ds | tr -d '"' | awk '{print tolower($0)}' | cut -d " " -f1 ))"
    prin "$(color 2)├Ś" "$(echo $(pacman -Q | wc -l) pkgs)"
    prin "$(color 3)├Ś" "$(echo "$SHELL" | cut -d "/" -f4)"
    prin "$(color 4)├Ś" "$(echo "$TERM" | cut -d "-" -f2)"
    prin "$(color 5)├Ś" "$(echo $XDG_CURRENT_DESKTOP)wm"
    prin "$(color 6)├Ś" "$(uname -r | cut -d "-" -f 1,4)"
    info "$(color 7)├Ś" uptime
    prin ""
    prin "$(curl 'wttr.in/Bristol?format=3&M' | cut -d: -f2)"
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="on"
os_arch="off"
uptime_shorthand="tiny"
memory_percent="off"
memory_unit="gib"
package_managers="off"
shell_path="off"
shell_version="off"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="off"
cpu_speed="off"
cpu_cores="logical"
cpu_temp="off"
gpu_brand="off"
gpu_type="all"
refresh_rate="off"
gtk_shorthand="off"
gtk2="on"
gtk3="on"
public_ip_host="http://ident.me"
public_ip_timeout=2
de_version="on"
disk_show=('/home')
disk_subtitle="mount"
disk_percent="on"
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"
mpc_args=()
colors=(distro)
bold="on"
underline_enabled="on"
underline_char=""
separator=" "
block_width=1
block_height=1
col_offset="auto"
bar_char_elapsed="-"
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"
image_backend="ascii"
image_source="$HOME/scripts/ascii/cactus"
ascii_distro="arch_small"
ascii_colors=(distro)
ascii_bold="on"
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="15%"
gap=3
yoffset=0
xoffset=0
background_color=
stdout="off"
