[settings]
set_wallpaper = true
gtk = false
active = 1
light_theme = false
editor = kitty -e nvim
execute_cmd = true
command = pywal-discord && xsettingsd -c "$XDG_CONFIG_HOME"/xsettingsd/xsettingsd.conf &
backend = wal
alpha = 100
smart_sort = true
auto_adjust = false
reload = true
vte = true
keywords = default

[keywords]
border-radius = 2
icons = Fluent-grey-dark
font0 = JetBrainsMono Nerd Font
font-size = 12
font-size-icon = 12
cursor = Bibata-Modern-Classic
show-icons = true

