# :.config/picom/picom.conf
# vim:set fdm=marker foldenable:

# ANIMATIONS {{{
transition-length = 250;
transition-pow-x = 0.35;
transition-pow-y = 0.35;
transition-pow-w = 0.35;
transition-pow-h = 0.35;
size-transition = true;
# }}}
# BORDERS {{{
corner-radius = 0.0;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
];
round-borders = 0;
# }}}
# SHADOWS {{{
shadow = true;
shadow-radius = 15;
shadow-opacity = .30;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",
  "class_g = 'hacksaw'",
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS@:c"
];
# }}}
# FADE {{{
fading = true;
fade-delta = 6;
fade-in-step = 0.028;
fade-out-step = 0.03;
no-fading-openclose = false;
fade-exclude = [ ];
# }}}
# OPACITY {{{
inactive-opacity = 0.96;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;
inactive-dim = 0;
# }}}
# BLUR {{{
blur: {
    method = "dual_kawase";
    strength = 10;
    size = 20;
    deviation = 1.0;
    background = true;
    background-frame = true;
    background-fixed = false;
    kern = "3x3box";
}
blur-background-exclude = [
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'Polybar'"
];
# }}}
# BACKEND / GENERAL {{{
experimental-backends = true;
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
unredir-if-possible = false;
detect-client-opacity = true;
refresh-rate = 144;
detect-transient = true;
detect-client-leader = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;
xrender-sync-fence = true;
log-level = "error";
# }}}
# DEFINE WINDOW TYPE {{{
wintypes:
{
  normal = { fade = true; shadow = true; }
  tooltip = { fade = false; shadow = true; opacity = 1; focus = true; full-shadow = false; blur = false};
  dock = { shadow = true; }
  dnd = { shadow = true; }
  popup_menu = { opacity = 1; shadow = true; fade = false }
  dropdown_menu = { opacity = 1 }
};
# }}}
