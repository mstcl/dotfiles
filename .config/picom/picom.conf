# :.config/picom/picom.conf
# vim:set fdm=marker foldenable:

# ANIMATIONS {{{
transition-length = 250;
transition-pow-x = 0.35;
transition-pow-y = 0.35;
transition-pow-w = 0.35;
transition-pow-h = 0.35;
size-transition = true;
# }}}
# BORDERS {{{
corner-radius = 14.0;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
];
round-borders = 14;
# }}}
# SHADOWS {{{
shadow = true;
shadow-radius = 20;
shadow-opacity = .20;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'Dunst'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'",
    "class_g = 'hacksaw'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
];
# }}}
# FADE {{{
fading = true;
fade-delta = 4;
fade-in-step = 0.028;
fade-out-step = 0.03;
no-fading-openclose = false;
fade-exclude = [ ];
# }}}
# OPACITY {{{
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = true;
inactive-dim = 0;
opacity-rule = [
  "0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
];
# }}}
# BLUR {{{
blur: {
    method = "dual_kawase";
    strength = 3,
    size = 2;
    deviation = 1.0;
    background = true;
    background-frame = true;
    background-fixed = false;
    kern = "3x3box";
};
blur-background-exclude = [
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'Polybar'",
    "class_g = 'LibreWolf'",
    "window_type = 'menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'popup_menu'",
    "window_type = 'tooltip'",
    "role   = 'xborder'",
]
# }}}
# BACKEND / GENERAL {{{
experimental-backends = true;
backend = "glx";
vsync = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
unredir-if-possible = true;
detect-client-opacity = true;
refresh-rate = 144;
detect-transient = true;
detect-client-leader = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;
xrender-sync-fence = true;
log-level = "error";
# }}}
# DEFINE WINDOW TYPE {{{
wintypes:
{
  normal = { fade = true; shadow = false;}
  tooltip = { fade = false; shadow = false; opacity = 1; focus = true; full-shadow = false; blur = false;}
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1; shadow = false; fade = false; }
  dropdown_menu = { opacity = 1; shadow = false;}
};
# }}}
