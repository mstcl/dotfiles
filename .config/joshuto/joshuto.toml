scroll_offset = 6
xdg_open = true
xdg_open_fork = false
use_trash = true
watch_files = true
max_preview_size = 2097152 # 2MB

[display]
mode = "default"
collapse_preview = true
column_ratio = [1, 3, 4]
show_borders = true
show_hidden = false
show_icons = false
tilde_in_titlebar = true
line_number_style = "none"

[display.sort]
method = "natural"
case_sensitive = false
directories_first = true
reverse = false
