font=Monaspace Neon Var:size=14,Apple Color Emoji:size=14,Symbols Nerd Font:size=14
line-height=20
underline-offset=5px
box-drawings-uses-font-glyphs=no
dpi-aware=no
pad=8x8 center
include=~/.config/foot/themes/ivory.ini
include=~/.config/foot/themes/tavern.ini
initial-color-theme=1

[bell]
system=no

[scrollback]
lines=2000

[cursor]
style=beam
blink=yes
blink-rate=500
beam-thickness=1

[mouse]
hide-when-typing=true

[key-bindings]
search-start=Control+Shift+slash
show-urls-launch=Control+Shift+o
unicode-input=none
color-theme-toggle=Control+Shift+t

[search-bindings]
find-prev=Control+p
find-next=Control+n

[tweak]
box-drawing-base-thickness=0.04
box-drawing-solid-shades=no
