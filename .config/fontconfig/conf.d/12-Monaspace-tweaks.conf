<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <match target="font">
    <test name="family" compare="eq">
		<string>Monaspace Neon</string>
    </test>
    <edit name="fontfeatures" mode="append">
      <string>calt</string>
      <string>liga</string>
    </edit>
  </match>
</fontconfig>
