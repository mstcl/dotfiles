#################################
#             Corners           #
#################################
corner-radius = 10.0;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
];
round-borders = 1;
round-borders-rule = [
  "0:class_g = 'Dunst'",
  "0:class_g = 'Pcmanfm'",
  "0:class_g = 'kitty'",
  "0:class_g = 'Thunderbird'",
  "0:class_g = 'firefox'",
  "0:class_g = 'Rofi'",
  "0:class_g = 'Brave-browser'",
  "0:class_g = 'Spotify'"
];

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 15;
shadow-opacity = .8
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Backend             #
#################################
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
experiment_backends = true
#################################
#     Background-Blurring       #
#################################
blur: {
  method = "none";
  strength = 5;
  size = 20;
  deviation = 1.0;
  background = true;
  background-frame = true;
  background-fixed = false;
  kern = "3x3box";
}
blur-background-exclude = [
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Opacity             #
#################################
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 0.2;
inactive-opacity-override = false;
inactive-dim = 0;

#################################
#            Fading             #
#################################
fading = true;
fade-delta = 2;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = false;
fade-exclude = [ ];

#################################
#            Other              #
#################################
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
vsync = true;
dbe = false;
unredir-if-possible = false;
focus-exclude = [ ];
detect-transient = true;
detect-client-leader = true;

#################################
#     Window type settings      #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true;};
  dock = { shadow = true; }
  dnd = { shadow = true; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
};

######################
#       XSync        #
######################
xrender-sync-fence = true;
