#################################
#          Animations           #
#################################
transition-length = 350;
transition-pow-x = 0.35;
transition-pow-y = 0.35;
transition-pow-w = 0.35;
transition-pow-h = 0.35;
size-transition = true;


#################################
#             Corners           #
#################################
corner-radius = 2.0;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
];
round-borders = 1;

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 15;
shadow-opacity = .35;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#           Fading              #
#################################
fading = true;
fade-delta = 12;
fade-in-step = 0.1;
fade-out-step = 0.1;
no-fading-openclose = false;
fade-exclude = [ ];


#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 0.95;
active-opacity = 1;
frame-opacity = 0.5;
inactive-opacity-override = false;
inactive-dim = 0;

#################################
#     Background-Blurring       #
#################################
blur: {
    method = "dual_kawase";
    strength = 10;
    size = 20;
    deviation = 1.0;
    background = true;
    background-frame = true;
    background-fixed = false;
    kern = "3x3box";
}
blur-background-exclude = [
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################
experimental-backends = true;
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
unredir-if-possible = false;
detect-client-opacity = true;
refresh-rate = 144;
detect-transient = true;
detect-client-leader = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = false;
xrender-sync-fence = true;
log-level = "error";

#################################
#     Window type settings      #
#################################
wintypes:
{
  normal = { fade = true; shadow = true; }
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = true; };
  dock = { shadow = true; }
  dnd = { shadow = true; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
};
