[global/wm]
margin-bottom = 0
margin-top = 0

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; File Inclusion
include-file = ~/scripts/polybar/bar/colors.ini
include-file = ~/scripts/polybar/bar/modules.ini

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Bar Settings
[bar/main]
monitor =
monitor-fallback =
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 100%
height = 40
offset-x = 0%
offset-y = 0%
background = #101010
foreground = #f6f6f6
radius-top = 0.0
radius-bottom = 0.0
underline-size = 2
underline-color = #f6f6f6
border-size = 0
border-color = #101010
padding-left = 1
padding-right = 2
module-margin-left = 1
module-margin-right = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Fonts
font-0 = "JetBrainsMono Nerd Font Mono:pixelsize=12;3"
font-1 = "JetBrainsMono Nerd Font Mono:pixelsize=14;4"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Modules
modules-left = i3 player
modules-center =
modules-right = trash lang ip-tail updates redshift notifications pulseaudio date picom

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; General
separator =
dim-value = 1.0
wm-name = i3
locale = en_GB.UTF-8
tray-position = center
tray-detached = false
tray-maxsize = 16
tray-background = #101010
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0
enable-ipc = true
click-left =
click-middle =
click-right =
scroll-up =
scroll-down =
double-click-left =
double-click-middle =
double-click-right =
cursor-click =
cursor-scroll =

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

;; Application Settings
[settings]
throttle-output = 5
throttle-output-for = 10
screenchange-reload = false
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over
pseudo-transparency = false

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
