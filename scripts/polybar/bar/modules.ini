; vim:set fdm=marker foldenable:
; COLORS {{{
[color]
background = ${xrdb:background:#101010}
foreground = ${xrdb:foreground:#e6e6e6}
foreground-alt = ${xrdb:color15:#c7c7c7}
shade1 = ${xrdb:color1:#b67262}
shade2 = ${xrdb:color2:#8a9273}
shade3 = ${xrdb:color3:#c0a474}
shade4 = ${xrdb:color4:#78859e}
shade5 = ${xrdb:color5:#9b859d}
shade6 = ${xrdb:color6:#a8d2db}
shade7 = ${xrdb:color7:#e6e6e6}
shade8 = ${xrdb:color8:#353535}
; }}}
; TRASH {{{
[module/trash]
type = custom/script
exec = echo $(expr $(find ~/.local/share/Trash/files | wc -l) - 1)
format = %{T1}<label>%{T-}
format-foreground = ${color.shade6}
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${color.shade2}
interval = 5.0
; }}}
; LANG {{{
[module/lang]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/get-lang.sh
format = %{T1}<label>%{T-}
format-foreground = ${color.shade8}
format-prefix-foreground = ${color.shade8}
interval = 1.0
click-left = ~/scripts/hardware/chkm.sh &
; }}}
; IP-TAIL {{{
[module/ip-tail]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/get-ip.sh
format = %{T1}<label>%{T-}
format-foreground = ${color.shade1}
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${color.shade1}
interval = 5
; }}}
; DATE {{{
[module/date]
type = internal/date
interval = 1.0
time = "%{T2} %{T-}%I:%M"
time-alt = "%{T2}%{T-} %a, %d %b %Y"
format = <label>
format-background = ${color.background}
format-foreground = ${color.shade3}
format-padding = 0
label = "%{T-}%time%"
; }}}
; I3 {{{
[module/i3]
type = internal/i3
pin-workspaces = false
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = true
reverse-scroll = false
fuzzy-match = true
ws-icon-0 = 1: Term;
ws-icon-1 = 2: Web;爵
ws-icon-2 = 3: Study;
ws-icon-3 = 4: Media;ﳝ
ws-icon-4 = 5: Games;
ws-icon-default = 
format = <label-state><label-mode>
format-padding = 0
format-background = ${color.background}
label-mode = %mode%
label-mode-background = ${color.background}
label-focused = %{T2}%{T-}%{T1}%name%  %{T-}
label-focused-foreground = ${color.shade1}
label-unfocused = %{T2}%{T-}%{T1}%name%  %{T-}
label-unfocused-foreground = ${color.shade8}
label-visible = %{T1} %{T-}%{T1}%name%  %{T-}
label-urgent = %{T2} %{T-}%{T1}%name%  %{T-}
label-urgent-foreground = ${color.shade3}
label-focused-padding = 0
label-urgent-padding = 0
label-unfocused-padding = 0
label-visible-padding = 0
label-mode-padding = 0
; }}}
; PULSEAUDIO {{{
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
format-volume = %{T2}<ramp-volume>%{T1}<bar-volume> %{T-}
format-volume-background = ${color.background}
format-volume-foreground = ${color.shade3}
format-volume-padding = 0
format-muted = %{T1}<label-muted> %{T-}
format-muted-prefix = %{T2}婢
format-muted-foreground = ${color.shade8}
format-muted-background = ${color.background}
format-muted-padding = 0
label-volume = %percentage%%
label-muted = ""
label-muted-foreground = ${color.shade8}
ramp-volume-0 = "奄 "
ramp-volume-1 = "奔 "
ramp-volume-2 = "墳 "
bar-volume-width                = 8
bar-volume-gradient             = false
bar-volume-indicator            = 
bar-volume-indicator-foreground = ${color.shade3}
bar-volume-fill                 = 
bar-volume-fill-foreground      = ${color.shade3}
bar-volume-empty                = 
bar-volume-empty-foreground     = ${color.shade8}
click-right = bash ~/scripts/rofi/rofi-select-sink.sh &
click-middle = pavucontrol
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
; }}}
; KEYBOARD {{{
[module/keyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout> <label-indicator>
format-prefix = 
format-background = ${color.shade4}
format-padding = 2
label-layout = " %layout%"
label-indicator-on = %name%
label-indicator-on-foreground = ${color.foreground}
; }}}
; TITLE {{{
[module/title]
type = internal/xwindow
format = <label>
format-prefix =
format-background = ${color.background}
format-padding = 0
label = "%title%"
label-maxlen = 15
label-empty = ""
; }}}
; NOTIFICATIONS {{{
[module/notifications]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/dunststatus.sh
format = <label>
interval = 0.5
click-right = dunstctl history-pop
format-foreground = ${color.shade8}
click-left = dunstctl set-paused toggle
; }}}
; TASKS {{{
[module/taskwarrior]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/get-tasks.sh
format = <label>
interval = 2
click-left = ~/scripts/other/tasknotify.sh
format-foreground = ${color.shade8}
; }}}
; PICOM {{{
[module/picom]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/picomstatus.sh
format = <label>
interval = 0.5
format-foreground = ${color.shade8}
click-left = bash ~/scripts/hardware/picomtoggle.sh
; }}}
; IP-TAIL {{{
[module/redshift]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/info-redshift-temp.sh
format = %{T1}<label>%{T-}
format-foreground = ${color.shade4}
format-prefix = "%{T1} %{T-}"
format-prefix-foreground = ${color.shade4}
interval = 5
; }}}
; PLAYER {{{
[module/player]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/player-mpris-simple.sh
interval = 0.5
format = <label>
format-foreground = ${color.shade8}
format-prefix = %{T2}%{T-}
format-prefix-foreground = ${color.shade8}
format-padding = 0
click-middle = playerctl -p ncspot play-pause
click-right = playerctl -p ncspot next
click-left = playerctl -p ncspot previous
; }}}
; UPDATES {{{
[module/updates]
type = custom/script
exec = ~/scripts/polybar/bar/scripts/updates.sh
tail = true
format = <label>
format-foreground = ${color.shade8}
format-background = ${color.background}
format-padding = 0
label = "%output% "
click-left = kitty -T floatingKitty paru -Syu --removemake
; }}}
; SYSMENU {{{
[module/sysmenu]
type = custom/text
content = %{T2}⏻%{T-}
content-background = ${color.background}
content-foreground = ${color.foreground}
content-padding = 1
click-left = ~/scripts/rofi/powermenu.sh &
; }}}
; MENU {{{
[module/menu]
type = custom/menu
expand-right = true
menu-0-0 =%{T2} 
menu-0-0-exec = ~/scripts/rofi/launcher.sh &
menu-0-1 =%{T2} 
menu-0-1-exec = pcmanfm &
menu-0-2 = 
menu-0-2-exec = kitty &
menu-0-3 =%{T-}
menu-0-3-exec = brave & 
format = <label-toggle> <menu>
format-background = ${color.shade1}
format-foreground = ${color.background}
format-padding = 2
label-open = "%{T2}%{T-}"
label-close = %{T2}
label-separator = " %{T1}|%{T2} "
; }}}
