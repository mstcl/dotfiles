# :.config/sxhkd/sxhkdrc

super + b
    brave --disable-frame-rate-limit --max-gum-fps=144 --frame-throttle-fps=144

super + c
    qalculate-gtk

super + p; {r,f}
    bash {$HOME/scripts/other/pshot.sh, $HOME/scripts/other/fshot.sh}

super + s; {p,c,slash,period,comma,v}
    {kitty -o window_padding_width=20 -o tab_bar_min_tabs=2 -T spotify ncspot, \
    kitty -o window_padding_width=3 -o tab_bar_min_tabs=2 -o placement_strategy=center -T cover bash ~/scripts/other/dpcover.sh, \
    playerctl -p ncspot play-pause, \
    playerctl -p ncspot next, \
    playerctl -p ncspot previous, \
    kitty -o window_padding_width=20 -o tab_bar_min_tabs=2 -o font_size=6 -T cava bash ~/scripts/other/colorcava.sh 2>/dev/null}

super + Return
    kitty --listen-on unix:/tmp/mykitty

super + g
    bash $HOME/scripts/other/text-scratchpad.sh

super + r; {p,c,w}
    {bash $HOME/scripts/polybar/launch.sh, wpg -s $(wpg -c), i3-msg restart}

super + {minus,equal}
    i3-msg { move scratchpad, \
    scratchpad show }

super + {v,x}
    i3-msg split {v,h}

super + {f,o,z}
    i3-msg {fullscreen toggle, sticky toggle, focus mode_toggle}

super + {h,j,k,l}
    i3-msg focus {left,down,up,right}

super + {1,2,3,4,5}
    i3-msg workspace {1: Term,2: Web,3: Study,4: Media,5: Games}

super + {6,7,8,9,0}
    i3-msg workspace {6,7,8,9,10}

super + {Left,Right}
    i3-msg workspace {prev,next}

super + shift + {h,j,k,l}
    i3-msg move {left,down,up,right}

super + shift + Return
    kitty -T floatingKitty

super + shift + q
    i3-msg kill

super + shift + space
    i3-msg floating toggle

super + shift + {1,2,3,4,5}
    i3-msg move container to workspace {1: Term,2: Web,3: Study,4: Media,5: Games}

super + shift + {6,7,8,9,0}
    i3-msg move container to workspace {6,7,8,9,10}

super + shift + {Left,Right}
    i3-msg move container to workspace {prev,next}

alt + space
    bash $HOME/scripts/hardware/chkm.sh

hyper + {period,comma,m,n}
    pactl { set-sink-volume @DEFAULT_SINK@ +5%,\
    set-sink-volume @DEFAULT_SINK@ -5%, \
    set-sink-mute @DEFAULT_SINK@ toggle, \
    set-source-mute @DEFAULT_SOURCE@ toggle }

hyper + {p,v}
    bash { $HOME/scripts/rofi/powermenu.sh, \
    $HOME/scripts/rofi/rofi-select-sink.sh }

super + {space,period}
    bash { $HOME/scripts/rofi/launcher.sh, \
    $HOME/scripts/rofi/emojipick/emojipick }

alt + Tab
    rofi -show window
